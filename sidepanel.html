<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>采集选题</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="sidepanel-body">
    <main class="popup sidepanel">
      <header class="popup-header">
        <div>
          <p class="eyebrow">小红书选题器</p>
          <h1>采集当前笔记</h1>
        </div>
        <div class="header-actions">
          <button id="pinPanel" class="icon-button secondary" title="取消钉住" type="button">解</button>
          <button id="openDashboard" class="icon-button" title="打开表格库" type="button">表</button>
        </div>
      </header>

      <section id="captureState" class="state">正在读取当前页面...</section>

      <form id="captureForm" class="stack hidden">
        <div class="quick-actions">
          <button id="aiAnalyze" type="button">AI 分析</button>
          <button id="saveNote" type="button">保存</button>
          <button id="refresh" type="button" class="secondary">重抓</button>
          <button id="pickCover" type="button" class="secondary">选封面</button>
        </div>

        <label>
          栏目
          <select id="category"></select>
        </label>

        <label>
          标题
          <textarea id="title" rows="2"></textarea>
        </label>

        <div class="cover-preview">
          <img id="cover" alt="封面预览" />
          <span id="coverFallback">未识别到封面</span>
        </div>

        <label>
          关键词
          <input id="keywords" type="text" placeholder="用逗号分隔" />
        </label>

        <label>
          封面共性
          <textarea id="coverTakeaways" rows="3" placeholder="每行一个封面观察"></textarea>
        </label>

        <label>
          内容共性
          <textarea id="contentTakeaways" rows="3" placeholder="每行一个内容观察"></textarea>
        </label>

        <label>
          选题内容
          <textarea id="topicIdeas" rows="4" placeholder="每行一个选题"></textarea>
        </label>

        <label>
          备注
          <textarea id="notes" rows="3" placeholder="比如共性、封面结构、可复用角度"></textarea>
        </label>

        <div class="button-row">
          <button type="submit">保存到本地</button>
        </div>
      </form>
    </main>

    <script src="storage.js"></script>
    <script src="keyword.js"></script>
    <script src="ai.js"></script>
    <script src="cover.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
